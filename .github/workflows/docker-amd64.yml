name: Docker AMD64 Backend

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "backend/**"
      - "pyproject.toml"
      - ".dockerignore"
      - ".github/workflows/docker-amd64.yml"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push linux/amd64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            TORCH_WHL_INDEX=https://download.pytorch.org/whl/cu121
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/fertilizer-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/fertilizer-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
